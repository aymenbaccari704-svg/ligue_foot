<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Équipes</title>
</head>
<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">⚽ Ligue</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link active" href="/equipes">Équipes</a></li>
                        <li class="nav-item"><a class="nav-link" href="/classement">Classement</a></li>
                        <li class="nav-item"><a class="nav-link" href="/matchs">Matchs</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <h2 class="mt-4">Ajouter une équipe</h2>
        <form action="/equipes" method="POST" class="mb-4">
            <div class="mb-3">
                <label for="nom" class="form-label">Nom</label>
                <input id="nom" type="text" name="nom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="ville" class="form-label">Ville</label>
                <input id="ville" type="text" name="ville" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>

        <h2>Liste des équipes</h2>
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Ville</th>
                </tr>
            </thead>
            <tbody>
                {% for equipe in equipes %}
                    <tr>
                        <td>{{ equipe[1] }}</td>
                        <td>{{ equipe[2] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
