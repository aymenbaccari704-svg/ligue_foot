<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Classement</title>
</head>
<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">⚽ Ligue</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="/equipes">Équipes</a></li>
                        <li class="nav-item"><a class="nav-link active" href="/classement">Classement</a></li>
                        <li class="nav-item"><a class="nav-link" href="/matchs">Matchs</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <h2 class="mt-4">Classement</h2>
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Matchs joués</th>
                    <th>Victoires</th>
                    <th>Nuls</th>
                    <th>Défaites</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                {% for equipe in classement %}
                    <tr>
                        <td>{{ equipe[0] }}</td>
                        <td>{{ equipe[1] }}</td>
                        <td>{{ equipe[2] }}</td>
                        <td>{{ equipe[3] }}</td>
                        <td>{{ equipe[4] }}</td>
                        <td>{{ equipe[5] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
